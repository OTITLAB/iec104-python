name: Build Windows Wheel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel ninja "cmake>=3.18,<3.28"

      - name: Check submodule dirs
        run: |
          git submodule status
          dir depends\lib60870
          dir depends\pybind11

      - name: Test cmake configure (capture output)
        run: |
          mkdir build_test
          cmake -S . -B build_test -DPython_EXECUTABLE="$(python -c 'import sys; print(sys.executable)')" -DC104_VERSION_INFO=2.2.2 2>&1 | Tee-Object -FilePath cmake_output.txt
        continue-on-error: true

      - name: Upload cmake output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cmake-output
          path: cmake_output.txt
          retention-days: 7

      - name: Build wheel
        run: |
          pip wheel . --no-deps -w dist/ -v 2>&1 | Tee-Object -FilePath build_output.txt
        continue-on-error: true

      - name: Upload build output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-output
          path: build_output.txt
          retention-days: 7

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: c104-wheel-win-py311
          path: dist/*.whl
          retention-days: 30
          if-no-files-found: warn
