name: Build Windows Wheel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check submodule status
        run: |
          git submodule status
          dir depends

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel ninja cmake>=3.18,<3.28

      - name: Test cmake configure manually
        run: |
          mkdir build_test
          cd build_test
          cmake .. -DPython_EXECUTABLE="$(python -c 'import sys; print(sys.executable)')" -DC104_VERSION_INFO=2.2.2
        continue-on-error: true

      - name: Build wheel
        run: |
          pip wheel . --no-deps -w dist/ -v

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: c104-wheel-win-py311
          path: dist/*.whl
          retention-days: 30
